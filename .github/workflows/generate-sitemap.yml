name: Générer le sitemap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Essentiel pour permettre au bot de push le sitemap
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Permet de récupérer l'historique pour éviter des conflits de push bizarres
          fetch-depth: 0 
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          else
            echo "⚠️ Pas de package.json à la racine ! Installation des modules de secours..."
            npm install @supabase/supabase-js dotenv
          fi

      - name: Vérifier l'existence du script
        run: |
          echo "=== Recherche du script sitemap ==="
          find . -iname "generate-sitemap.js"
        
      - name: Generate sitemap
        env:
          # On passe le secret s'il existe, sinon une chaîne vide pour que le script Node prenne le relais
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || '' }}
        run: |
          SCRIPT_PATH=$(find . -iname "generate-sitemap.js" | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "❌ Erreur : Impossible de trouver le fichier generate-sitemap.js dans le projet."
            exit 1
          fi
          echo "Exécution de : node $SCRIPT_PATH"
          node "$SCRIPT_PATH"
        
      - name: Commit and push sitemap
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Identification du sitemap généré
          SITEMAP_PATH=$(find . -name "sitemap.xml" | head -n 1)
          
          if [ -z "$SITEMAP_PATH" ]; then
            echo "❌ Aucun fichier sitemap.xml généré trouvé."
            exit 1
          fi
          
          echo "Fichier sitemap trouvé ici : $SITEMAP_PATH"
          git add "$SITEMAP_PATH"
          
          # Le [skip ci] évite de déclencher une boucle infinie de builds
          git diff --staged --quiet || (git commit -m "🔄 Mise à jour automatique du sitemap [skip ci]" && git push)
